name: rotis tests

on:
  push:
    branches: [main]
    paths:
      - "rotis/**"
  pull_request:
    branches: [main]
    paths:
      - "rotis/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pytest rotis/tests -v --cov=rotis --cov-report=xml:rotis-coverage.xml
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: rotis-coverage.xml
          flags: rotis
          token: ${{ secrets.CODECOV_TOKEN }}
