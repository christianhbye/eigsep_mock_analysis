# EIGSEP experiment configuration
# Single source of truth for experiment-specific parameters.
# Override individual fields by passing a custom YAML to load_config().

world: earth

precision: float32  # float32 or float64 (float64 enables JAX x64 mode)

location:
  lon: -113.4033
  lat: 39.2477
  alt: 0.0    # meters

frequencies:
  min: 50.0   # MHz
  max: 250.0  # MHz
  n: 201       # number of channels

ground:
  temperature: 300.0  # K

receiver:
  temperature: 50.0   # K

beam:
  sampling: mwss
  file: eigsep_bowtie_v000_mwss.npz

horizon:
  file: horizon_mwss.npz

sky:
  model: gsm16
  resolution: lo
  include_cmb: true

